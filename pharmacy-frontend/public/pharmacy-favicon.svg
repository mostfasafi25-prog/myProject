<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="صيدلية">
  <title>صيدلية</title>
  <defs>
    <linearGradient id="ph-bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f766e"/>
      <stop offset="0.5" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <filter id="ph-sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#ph-bg)" filter="url(#ph-sh)"/>
  <!-- صليب طبي سميك يبقى واضحاً في 16×16 -->
  <rect x="24" y="13" width="16" height="38" rx="3" fill="#f0fdfa"/>
  <rect x="13" y="24" width="38" height="16" rx="3" fill="#f0fdfa"/>
</svg>
