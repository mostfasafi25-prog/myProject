# Blueprint لـ Render — ضع الملف في جذر مستودع Git (مجلد pharmacy-system إن كان هو الجذر).
# بعد الربط: عيّن المتغيرات اليدوية (sync: false) من لوحة Render.

services:
  - type: web
    name: pharmacy-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./pharmacy-backend/Dockerfile
    dockerContext: ./pharmacy-backend
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      # انسخ من لوحة Postgres → Internal Database URL (بعد ربط الخدمة أو لصق يدوي)
      - key: DATABASE_URL
        sync: false
      # php artisan key:generate --show محلياً
      - key: APP_KEY
        sync: false
      # https://pharmacy-api-xxxx.onrender.com بدون شرطة أخيرة
      - key: APP_URL
        sync: false
      # واجهة Vercel — عدّل إن غيّرت الدومين. فاصلة بين عدة أصول.
      - key: CORS_ALLOWED_ORIGINS
        value: "https://pharmacy-frontend-psi.vercel.app"
      # خطر أمني: true = الـ API المحمي يعمل بدون Bearer token (كأن المستخدم admin). عطّله للإنتاج: false
      - key: SKIP_API_AUTH
        value: "true"
      # للاختبار فقط: true = تسجيل فوري بدون بريد. REGISTER_SIMPLE_ALLOW_ADMIN=true يسمح تسجيل مدير من الواجهة (خطير).
      - key: REGISTER_SIMPLE_MODE
        value: "false"
      - key: REGISTER_SIMPLE_ALLOW_ADMIN
        value: "false"

  - type: web
    name: pharmacy-web
    runtime: static
    plan: free
    region: oregon
    rootDir: pharmacy-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
